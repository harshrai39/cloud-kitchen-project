<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>CKMS - Menu</title></head>
<body style="background:#121212; color:white; font-family:sans-serif; padding:20px;">
    <h1>Welcome, <span id="user"></span></h1>
    <div id="items">Loading...</div>
    <div style="background:#1e1e1e; padding:20px; margin-top:20px;">
        <h3>Checkout</h3>
        <p>Total: ₹<span id="bill">0.00</span></p>
        <select id="method"><option>UPI</option><option>Card</option><option>COD</option></select><br><br>
        <textarea id="addr" placeholder="Address" style="width:100%"></textarea><br>
        <button onclick="order()" style="width:100%; padding:10px; background:#28a745; color:white;">PAY & ORDER</button>
    </div>
    <script>
        const API = "https://cloud-kitchen-project.onrender.com";
        let cart = []; let total = 0;
        document.getElementById('user').innerText = localStorage.getItem('userName');

        async function load() {
            const res = await fetch(`${API}/menu`);
            const data = await res.json();
            const div = document.getElementById('items'); div.innerHTML = "";
            data.forEach(i => {
                div.innerHTML += `<div>${i.item_name} - ₹${i.price} <button onclick="add(${i.item_id}, ${i.price})">Add</button></div>`;
            });
        }
        function add(id, p) { cart.push(id); total += p; document.getElementById('bill').innerText = total; }
        async function order() {
            const res = await fetch(`${API}/place_order`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({customer_name: localStorage.getItem('userName'), items: cart, total_price: total, address: document.getElementById('addr').value, payment_method: document.getElementById('method').value})
            });
            if(res.ok) alert("Order Placed!");
        }
        load();
    </script>
</body>
</html>
