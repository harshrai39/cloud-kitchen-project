<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Cloud Kitchen - Order</title>
<style>
    body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
    .menu-item { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; border-left: 5px solid #ffc107; }
    .checkout { background: #1a1a1a; padding: 25px; border-radius: 12px; margin-top: 30px; }
    button { background: #ffc107; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .track-box { background: #222; border: 1px solid #ffc107; padding: 15px; margin-top: 20px; border-radius: 10px; display: none; }
</style>
</head>
<body>
    <h1>Welcome, <span id="user"></span></h1>
    <div id="menu-list">Loading Menu...</div>
    <div class="checkout">
        <h3>Total: ₹<span id="bill">0</span></h3>
        <textarea id="addr" placeholder="Delivery Address" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
        <button onclick="placeOrder()" style="width:100%; background:#28a745; color:white;">PLACE ORDER</button>
    </div>
    <div id="track-box" class="track-box">
        <h4>Live Status: <span id="status-txt" style="color:#ffc107;">Preparing</span></h4>
        <p>Rider: <span id="rider-txt">Searching...</span></p>
    </div>
    <script>
        const API = "https://cloud-kitchen-project.onrender.com";
        let cart = []; let total = 0;
        document.getElementById('user').innerText = localStorage.getItem('userName');

        async function load() {
            const res = await fetch(`${API}/menu`);
            const data = await res.json();
            const div = document.getElementById('menu-list'); div.innerHTML = "";
            data.forEach(i => div.innerHTML += `<div class="menu-item"><span>${i.item_name} - ₹${i.price}</span><button onclick="add(${i.item_id}, ${i.price})">Add</button></div>`);
        }
        function add(id, p) { cart.push(id); total += p; document.getElementById('bill').innerText = total; }
        async function placeOrder() {
            const res = await fetch(`${API}/place_order`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({customer_name: localStorage.getItem('userName'), items: cart, total_price: total, address: document.getElementById('addr').value, payment_method: "UPI"})
            });
            if(res.ok) { alert("Order Placed!"); document.getElementById('track-box').style.display = 'block'; setInterval(track, 5000); }
        }
        async function track() {
            const res = await fetch(`${API}/active_orders`);
            const data = await res.json();
            const my = data.find(o => o.customer_name === localStorage.getItem('userName'));
            if(my) { document.getElementById('status-txt').innerText = my.order_status; document.getElementById('rider-txt').innerText = my.delivery_rider; }
        }
        load();
    </script>
</body>
</html>
