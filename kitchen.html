<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display System</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .order-card { background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 10px; border-left: 10px solid #ffc107; }
        .btn { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Pending Kitchen Orders</h1>
    <div id="kitchen-list"></div>

    <script>
        async function loadKitchen() {
            const res = await fetch("https://cloud-kitchen-project.onrender.com/active_orders");
            const orders = await res.json();
            const div = document.getElementById('kitchen-list');
            div.innerHTML = "";
            
            orders.filter(o => o.order_status === 'Preparing').forEach(o => {
                div.innerHTML += `
                    <div class="order-card">
                        <h3>Order #${o.order_id}</h3>
                        <p><strong>Items:</strong> ${o.food_items}</p>
                        <p><strong>Address:</strong> ${o.delivery_address}</p>
                        <button class="btn">Mark as Ready</button>
                    </div>
                `;
            });
        }
        loadKitchen();
    </script>
</body>
</html>
