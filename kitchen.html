<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #333; color: white; padding: 20px; }
        .order-card { background: #444; padding: 15px; margin: 10px 0; border-left: 5px solid #ffc107; }
        h1 { color: #ffc107; }
    </style>
</head>
<body>
    <h1>Active Orders</h1>
    <div id="orders-container"></div>

    <script>
        const API_URL = "https://cloud-kitchen-project.onrender.com";

        async function fetchOrders() {
            const response = await fetch(`${API_URL}/active_orders`);
            const orders = await response.json();
            const container = document.getElementById('orders-container');
            container.innerHTML = "";

            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-card';
                div.innerHTML = `
                    <h3>Customer: ${order.customer_name}</h3>
                    <p><strong>Items:</strong> ${order.food_items}</p>
                    <p>Status: ${order.status}</p>
                `;
                container.appendChild(div);
            });
        }

        // Auto-refresh every 5 seconds to see new orders
        setInterval(fetchOrders, 5000);
        fetchOrders();
    </script>
</body>
</html>
