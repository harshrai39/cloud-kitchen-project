<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CKMS Admin - Real-Time Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 40px; margin: 0; }
        .header { border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 30px; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat-card { flex: 1; background: #161616; padding: 30px; border-radius: 15px; border-top: 4px solid #ffc107; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stat-card p { font-size: 14px; color: #888; letter-spacing: 1px; }
        .stat-card h2 { font-size: 45px; color: #ffc107; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 10px; overflow: hidden; }
        th { background: #222; color: #ffc107; padding: 15px; text-align: left; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; text-align: left; border-bottom: 1px solid #222; font-size: 14px; }
        .badge { background: #28a745; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cloud Kitchen Admin Analytics</h1>
        <p>Live Overview of Revenue and Orders</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <p>TOTAL STORE REVENUE</p>
            <h2 id="revenue">₹0.00</h2>
        </div>
        <div class="stat-card">
            <p>ACTIVE ORDERS</p>
            <h2 id="order-count">0</h2>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Bill Amount</th>
                <th>Payment</th>
                <th>Current Status</th>
                <th>Rider Info</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="6" style="text-align:center;">Fetching data from Cloud...</td></tr>
        </tbody>
    </table>

    <script>
        const API_URL = "https://cloud-kitchen-project.onrender.com/active_orders";

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const orders = await response.json();
                
                let totalRev = 0;
                let tableRows = "";

                orders.forEach(order => {
                    const amount = parseFloat(order.total_amount) || 0;
                    totalRev += amount;

                    tableRows += `
                        <tr>
                            <td>#${order.order_id}</td>
                            <td>${order.customer_name}</td>
                            <td>₹${amount.toFixed(2)}</td>
                            <td>${order.payment_method}</td>
                            <td><span class="badge">${order.order_status}</span></td>
                            <td>${order.delivery_rider}</td>
                        </tr>
                    `;
                });

                document.getElementById('revenue').innerText = "₹" + totalRev.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('order-count').innerText = orders.length;
                document.getElementById('table-body').innerHTML = tableRows;

            } catch (error) {
                console.error("Fetch failed", error);
                document.getElementById('table-body').innerHTML = "<tr><td colspan='6' style='color:red;'>Failed to connect to Render Backend.</td></tr>";
            }
        }

        // Run immediately and then every 10 seconds
        updateDashboard();
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
