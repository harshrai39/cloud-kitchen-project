<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CKMS Admin - Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 40px; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: #161616; padding: 30px; border-radius: 15px; border-top: 4px solid #ffc107; text-align: center; }
        .stat-card h2 { font-size: 40px; color: #ffc107; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #222; color: #ffc107; }
        .badge { background: #28a745; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Cloud Kitchen Analytics</h1>
    <div class="stats-grid">
        <div class="stat-card">
            <p>TOTAL REVENUE</p>
            <h2 id="revenue">₹0</h2>
        </div>
        <div class="stat-card">
            <p>ORDERS COMPLETED</p>
            <h2 id="order-count">0</h2>
        </div>
    </div>

    <table>
        <thead>
            <tr><th>Order ID</th><th>Customer</th><th>Total Bill</th><th>Method</th><th>Status</th><th>Logistics</th></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        async function load() {
            try {
                const res = await fetch("https://cloud-kitchen-project.onrender.com/active_orders");
                const orders = await res.json();
                let rev = 0; let rows = "";

                orders.forEach(o => {
                    rev += parseFloat(o.total_amount);
                    rows += `<tr>
                        <td>#${o.order_id}</td>
                        <td>${o.customer_name}</td>
                        <td>₹${o.total_amount}</td>
                        <td>${o.payment_method}</td>
                        <td><span class="badge">${o.order_status}</span></td>
                        <td>${o.delivery_rider}</td>
                    </tr>`;
                });

                document.getElementById('revenue').innerText = "₹" + rev.toLocaleString();
                document.getElementById('order-count').innerText = orders.length;
                document.getElementById('table-body').innerHTML = rows;
            } catch (e) { console.log("Offline"); }
        }
        load();
        setInterval(load, 15000); // Auto-refresh every 15 seconds
    </script>
</body>
</html>
