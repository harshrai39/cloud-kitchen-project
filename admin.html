<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Cloud Kitchen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 40px; }
        .header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 40px; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card { background: #161616; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-top: 4px solid #ffc107; }
        .card h2 { font-size: 48px; margin: 15px 0; color: #ffc107; }
        .card p { color: #888; font-weight: bold; letter-spacing: 1px; }
        .refresh-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="header">
        <button class="refresh-btn" onclick="loadAnalytics()">Refresh Data</button>
        <h1>Management Analytics Dashboard</h1>
        <p>Live tracking of revenue and order volume.</p>
    </div>

    <div class="stats-container">
        <div class="card">
            <p>TOTAL REVENUE</p>
            <h2 id="revenue">₹0</h2>
        </div>
        <div class="stat-card card">
            <p>ORDERS COMPLETED</p>
            <h2 id="order-count">0</h2>
        </div>
        <div class="stat-card card">
            <p>UNIQUE CUSTOMERS</p>
            <h2 id="customer-count">0</h2>
        </div>
    </div>

    <script>
        const API_URL = "https://cloud-kitchen-project.onrender.com";

        async function loadAnalytics() {
            try {
                const response = await fetch(`${API_URL}/active_orders`);
                const orders = await response.json();
                
                let totalRevenue = 0;
                let customers = new Set();

                orders.forEach(order => {
                    totalRevenue += parseFloat(order.total_amount || 0);
                    customers.add(order.customer_name);
                });

                document.getElementById('revenue').innerText = `₹${totalRevenue.toLocaleString()}`;
                document.getElementById('order-count').innerText = orders.length;
                document.getElementById('customer-count').innerText = customers.size;
            } catch (err) {
                console.error("Stats failed to load");
            }
        }

        // Auto-load analytics on page open
        loadAnalytics();
        // Auto-refresh every 30 seconds
        setInterval(loadAnalytics, 30000);
    </script>
</body>
</html>
