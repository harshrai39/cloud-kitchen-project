<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CKMS Admin - Revenue & Logistics</title>
    <style>
        body { font-family: sans-serif; background: #000; color: white; padding: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .box { flex: 1; background: #111; padding: 20px; border-radius: 10px; border-top: 4px solid #ffc107; text-align: center; }
        .box h2 { font-size: 35px; margin: 10px 0; color: #ffc107; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border: 1px solid #333; text-align: left; }
        th { background: #222; }
    </style>
</head>
<body>
    <h1>Management Analytics Dashboard</h1>
    <div class="stats">
        <div class="box"><p>REVENUE</p><h2 id="rev">₹0</h2></div>
        <div class="box"><p>TOTAL ORDERS</p><h2 id="ocount">0</h2></div>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Customer</th><th>Items</th><th>Bill</th><th>Status</th><th>Rider</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        async function load() {
            const res = await fetch("https://cloud-kitchen-project.onrender.com/active_orders");
            const orders = await res.json();
            let total = 0; let body = "";
            orders.forEach(o => {
                total += parseFloat(o.total_amount);
                body += `<tr><td>#${o.order_id}</td><td>${o.customer_name}</td><td>${o.food_items}</td><td>₹${o.total_amount}</td><td>${o.order_status}</td><td>${o.delivery_rider}</td></tr>`;
            });
            document.getElementById('rev').innerText = "₹" + total;
            document.getElementById('ocount').innerText = orders.length;
            document.getElementById('table-body').innerHTML = body;
        }
        load();
    </script>
</body>
</html>
