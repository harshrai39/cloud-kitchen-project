<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>CKMS - Login</title>
<style>
    body { background: #0b0b0b; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #1a1a1a; padding: 40px; border-radius: 15px; width: 320px; border-top: 4px solid #ffc107; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #ffc107; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
</style></head>
<body>
    <div class="card">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
    <script>
        const API = "https://cloud-kitchen-project.onrender.com";
        async function login() {
            const res = await fetch(`${API}/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            const user = await res.json();
            if(res.ok) { 
                localStorage.setItem('userName', user.fullname); 
                window.location.href = (user.role === 'admin') ? "admin.html" : "menu.html";
            } else alert("Invalid Login");
        }
    </script>
</body>
</html>
