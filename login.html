<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKMS - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        h2 { color: #ffc107; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ffc107; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #e0a800; }
        .signup-link { margin-top: 20px; font-size: 14px; color: #bbb; }
        .signup-link a { color: #ffc107; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Member Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginUser()">Login</button>
        <div class="signup-link">
            New here? <a href="signup.html">Create Account</a>
        </div>
    </div>

    <script>
        const API_URL = "https://cloud-kitchen-project.onrender.com";

        async function loginUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("Please fill all fields");

            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();
            if (response.ok) {
                // Save user info in the browser so we know who is logged in
                localStorage.setItem('userName', result.fullname);
                localStorage.setItem('userRole', result.role);
                
                alert(`Welcome back, ${result.fullname}!`);
                
                // Redirect based on role
                if (result.role === 'admin') {
                    window.location.href = "admin.html";
                } else if (result.role === 'chef') {
                    window.location.href = "kitchen.html";
                } else {
                    window.location.href = "index.html";
                }
            } else {
                alert(result.error || "Login failed");
            }
        }
    </script>
</body>
</html>
