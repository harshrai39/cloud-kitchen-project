<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>CKMS - Login</title></head>
<body style="background:#121212; color:white; font-family:sans-serif; text-align:center; padding:50px;">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" style="padding:10px; margin:5px;"><br>
    <input type="password" id="pass" placeholder="Password" style="padding:10px; margin:5px;"><br>
    <button onclick="login()" style="padding:10px 20px; background:#ffc107;">Login</button>
    <script>
        async function login() {
            const res = await fetch("https://cloud-kitchen-project.onrender.com/login", {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            const user = await res.json();
            if(res.ok) { localStorage.setItem('userName', user.fullname); window.location.href="menu.html"; }
            else alert("Invalid!");
        }
    </script>
</body>
</html>
