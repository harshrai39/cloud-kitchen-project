<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Kitchen - Order Now</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .menu-item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        input { padding: 10px; width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Welcome to Cloud Kitchen</h1>
    <input type="text" id="customerName" placeholder="Enter Your Name">
    <div id="menu-container"></div>
    <button onclick="placeOrder()">Place Order</button>

    <script>
        const API_URL = "https://cloud-kitchen-project.onrender.com";
        let selectedItems = [];

        // Load Menu from Cloud
        async function loadMenu() {
            const response = await fetch(`${API_URL}/menu`);
            const items = await response.json();
            const container = document.getElementById('menu-container');
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerHTML = `
                    <h3>${item.item_name} - ₹${item.price}</h3>
                    <button onclick="toggleItem(${item.item_id})">Select Item</button>
                `;
                container.appendChild(div);
            });
        }

        function toggleItem(id) {
            if (selectedItems.includes(id)) {
                selectedItems = selectedItems.filter(i => i !== id);
                alert("Item removed");
            } else {
                selectedItems.push(id);
                alert("Item added to cart");
            }
        }

        async function placeOrder() {
            const name = document.getElementById('customerName').value;
            if (!name || selectedItems.length === 0) return alert("Enter name and select food!");

            const response = await fetch(`${API_URL}/place_order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name, items: selectedItems })
            });

            if (response.ok) {
                alert("Order Sent to Kitchen!");
                selectedItems = [];
            }
        }

        loadMenu();
    </script>
</body>
</html>
