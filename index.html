<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CKMS Order</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #333; }
        .selected { border: 2px solid #ffc107; }
        button { background: #ffc107; color: black; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background: #2d2d2d; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Welcome, <span id="user-display">Guest</span></h2>
    <div id="menu-items">Loading...</div>

    <div class="card">
        <h3>Checkout</h3>
        <p>Total: ₹<span id="bill">0.00</span></p>
        <select id="pay-type">
            <option value="UPI">UPI (GPay/PhonePe)</option>
            <option value="Card">Credit Card</option>
            <option value="COD">Cash on Delivery</option>
        </select>
        <textarea id="ship-addr" placeholder="Enter Full Delivery Address"></textarea>
        <button onclick="sendOrder()">PLACE ORDER & PAY</button>
    </div>

    <script>
        const API = "https://cloud-kitchen-project.onrender.com";
        let cart = []; let total = 0;
        const name = localStorage.getItem('userName') || "Guest";
        document.getElementById('user-display').innerText = name;

        async function loadMenu() {
            const res = await fetch(`${API}/menu`);
            const items = await res.json();
            const div = document.getElementById('menu-items'); div.innerHTML = "";
            items.forEach(i => {
                div.innerHTML += `<div class="card" id="food-${i.item_id}">
                    <h4>${i.item_name} - ₹${i.price}</h4>
                    <button onclick="pick(${i.item_id}, ${i.price})">Select</button>
                </div>`;
            });
        }

        function pick(id, price) {
            const el = document.getElementById(`food-${id}`);
            if(cart.includes(id)) { cart = cart.filter(x => x !== id); total -= price; el.classList.remove('selected'); }
            else { cart.push(id); total += price; el.classList.add('selected'); }
            document.getElementById('bill').innerText = total.toFixed(2);
        }

        async function sendOrder() {
            const addr = document.getElementById('ship-addr').value;
            if(!addr || cart.length === 0) return alert("Select food and enter address!");
            const res = await fetch(`${API}/place_order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({customer_name: name, items: cart, total_price: total, address: addr, payment_method: document.getElementById('pay-type').value})
            });
            if(res.ok) { alert("Order Successful!"); window.location.reload(); }
        }
        loadMenu();
    </script>
</body>
</html>
