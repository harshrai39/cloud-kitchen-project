<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>CKMS - Signup</title></head>
<body style="background:#121212; color:white; font-family:sans-serif; text-align:center; padding:50px;">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Full Name" style="padding:10px; margin:5px;"><br>
    <input type="email" id="email" placeholder="Email" style="padding:10px; margin:5px;"><br>
    <input type="password" id="pass" placeholder="Password" style="padding:10px; margin:5px;"><br>
    <button onclick="signup()" style="padding:10px 20px; background:#ffc107;">Register</button>
    <p>Already a member? <a href="login.html" style="color:#ffc107;">Login</a></p>
    <script>
        async function signup() {
            const res = await fetch("https://cloud-kitchen-project.onrender.com/signup", {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fullname: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            if(res.ok) window.location.href="login.html"; else alert("Error!");
        }
    </script>
</body>
</html>
