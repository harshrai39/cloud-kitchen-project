<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>CKMS - Signup</title>
<style>
    body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: #1a1a1a; padding: 40px; border-radius: 15px; width: 320px; border-top: 4px solid #ffc107; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #ffc107; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
    <div class="card">
        <h2>Register Account</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <p>Existing User? <a href="login.html" style="color:#ffc107;">Login</a></p>
    </div>
    <script>
        async function signup() {
            const res = await fetch("https://cloud-kitchen-project.onrender.com/signup", {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fullname: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('pass').value})
            });
            if(res.ok) window.location.href="login.html"; else alert("Email already exists!");
        }
    </script>
</body>
</html>
